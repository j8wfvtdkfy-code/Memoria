<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscándote en las nubes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #f7f4ee; /* Tono papel cálido de fondo */
    background-image: 
        radial-gradient(at 10% 20%, rgba(184, 207, 227, 0.3) 0px, transparent 50%),
        radial-gradient(at 90% 80%, rgba(184, 207, 227, 0.3) 0px, transparent 50%);
    background-attachment: fixed;
    color: #2c3e50;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 80px 24px;
    box-sizing: border-box;
}

h1 {
    font-family: "Georgia", serif;
    font-weight: normal;
    font-style: italic;
    font-size: 32px;
    color: #1a2a3a;
    margin-bottom: 5px;
    letter-spacing: 0.5px;
}

.subtitle {
    font-size: 15px;
    line-height: 1.6;
    opacity: 0.8;
    margin-top: 30px;
    margin-bottom: 40px;
}

.cloud-illustration {
    font-size: 50px;
    margin: 30px 0;
    opacity: 0.85;
}

/* Reproductor estilizado como el de la imagen */
.audio-player-container {
    background: rgba(255, 255, 255, 0.65);
    border-radius: 30px;
    padding: 12px 20px;
    margin: 40px 0;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
}

audio {
    width: 100%;
    height: 40px;
    outline: none;
}

/* Nota de agradecimiento intermedia */
.thanks {
    font-size: 14px;
    font-style: italic;
    opacity: 0.75;
    line-height: 1.6;
    margin: 40px 0;
}

.heart {
    color: #b8cfe3;
    font-size: 12px;
    margin-bottom: 10px;
}

.footer {
    font-size: 13px;
    line-height: 1.8;
    opacity: 0.6;
    margin-top: 80px;
    border-top: 1px solid rgba(0, 0, 0, 0.05);
    padding-top: 20px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Buscando en las nubes</h1>
    
    <div class="cloud-illustration">☁️</div>

    <div class="subtitle">
        Una pequeña música para acompañar<br>lo que no siempre se puede decir.
    </div>

    <div class="audio-player-container">
        <audio controls controlsList="nodownload">
            <source src="https://drive.google.com/uc?export=download&id=1TYHaf9pOh5CMGV-1PrMxRxAEQ7qwq8zS" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <div class="thanks">
        <div class="heart">♥</div>
        Gracias por escuchar.<br>Que te encuentre algo bonito hoy.
    </div>

    <div class="footer">
        Este cuaderno es para lo que llega,<br>
        para lo que se queda,<br>
        y para lo que aún estás buscando.
    </div>

</div>

</body>
</html>
